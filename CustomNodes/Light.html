<script type="text/javascript">
  RED.nodes.registerType("Light", {
    category: "SCC4-DeviceRegistry",
    color: "#a6bbc2",
    defaults: {
      name: { value: "灯光控制" },
      mode: { value: "Status" },
      getStatusMethod: { value: "RestfulAPI" },
      Switch: { value: false },
      SetPercent: { value: "" },
      Alarm: { value: false },
      actionName: { value: "" },
      Overtime: { value: 300 },
    },
    inputs: 1,
    outputs: 4,
    icon: "file.png",
    label: function () {
      return this.name || "Light";
    },
    outputLabels: ["开关", "亮度", "报警", "状态流"],
    labelsStyle: function () {
      return this.name ? "node_label_italic" : "";
    },
    oneditprepare: function () {
      var node = this;
      $("#node-input-mode").on("change", () => showControlTab());
    },
  });

  function showControlTab() {
    var val = $("#node-input-mode").val();
    if (val == "Status") {
      $("#node-Switch").hide();
      $("#node-SetPercent").hide();
      $("#node-Alarm").hide();
      $("#node-Overtime").show();
      $("#node-getStatusMethod").show();
      $("#node-input-name").val("灯光状态");
    } else {
      $("#node-Switch").show();
      $("#node-SetPercent").show();
      $("#node-Alarm").show();
      $("#node-Overtime").hide();
      $("#node-getStatusMethod").hide();
      $("#node-input-name").val("灯光控制");
    }
  }
</script>

<script type="text/html" data-template-name="Light">
  <div class="form-row">
    <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
    <input
      type="text"
      id="node-input-name"
      placeholder="名称"
      ng-model="node.name"
    />
    <div class="form-row">
      <label for="node-input-nodeStatus"
        ><i class="fa fa-tag"></i> 节点状态</label
      >
      <select id="node-input-mode" ng-model="node.mode">
        <option value="Status">状态</option>
        <option value="Control">控制</option>
      </select>
    </div>
    <div class="form-row" id="node-getStatusMethod">
      <label for="node-input-getStatusMethod"
        ><i class="fa fa-cog"></i> 获取状态方式</label
      >
      <select id="node-input-getStatusMethod" ng-model="node.getStatusMethod">
        <option value="RestfulAPI">RestfulAPI</option>
        <option value="WebSocket">WebSocket</option>
      </select>
    </div>
    <div class="form-row" id="node-Switch">
      <label for="node-input-Switch"
        ><i class="fa fa-tag"></i> 开关
        <input
          type="checkbox"
          id="node-input-Switch"
          style="display:inline-block; width:22px;vertical-align:baseline;"
          ng-model="node.Switch"
        />
      </label>
    </div>
    <div class="form-row" id="node-SetPercent">
      <label for="node-input-SetPercent"><i class="fa fa-tag"></i> 开度</label>
      <input
        type="text"
        id="node-input-SetPercent"
        ng-model="node.SetPercent"
      />
    </div>
    <div class="form-row" id="node-Alarm">
      <label for="node-input-Alarm"><i class="fa fa-tag"></i> 报警</label>
      <input
        type="checkbox"
        id="node-input-Alarm"
        placeholder="报警"
        ng-model="node.alarm"
      />
    </div>
    <div class="form-row" id="node-Overtime">
      <label for="node-input-Overtime"
        ><i class="fa fa-tag"></i> 超时时间 （单位：秒）</label
      >
      <input type="number" id="node-input-Overtime" ng-model="node.Overtime" />
    </div>
    <div class="form-row" id="node-actionName">
      <label for="node-input-actionName"
        ><i class="fa fa-tag"></i> 操作名称</label
      >
      <input type="text" id="node-input-actionName" ng-model="node.actionName" />
  </div>
</script>
