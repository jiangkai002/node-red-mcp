<script type="text/javascript">
    RED.nodes.registerType("LogNode", {
        category: "SCC4-DeviceRegistry",
        color: "#8BEA83",
        defaults: {
            name: { value: "日志" },
            log: { value: "" },
            result: { value: "" },
        },
        inputs: 1,
        icon: "file.png",
        label: function () {
            return this.name || "LogNode";
        },
        labelsStyle: function () {
            return this.name ? "node_label_italic" : "";
        },
    });
</script>

<script type="text/html" data-template-name="LogNode">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> 名称</label>
        <input type="text" id="node-input-name" placeholder="名称" />
    </div>
    <div class="form-row">
        <label for="node-input-log"><i class="fa fa-tag"></i> 日志</label>
        <input type="text" id="node-input-log" placeholder="日志" />
    </div>
    <div class="form-row">
        <label for="node-input-result"><i class="fa fa-tag"></i> 控制结果</label>
        <input type="text" id="node-input-result" placeholder="控制结果" />
    </div>

</script>
